<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ASTEROIDS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: "Courier New", monospace;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
  }
  #wrap {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    display: block;
    background: #000;
    box-shadow: 0 0 40px rgba(120, 220, 255, 0.15);
    image-rendering: pixelated;
  }
  #hint {
    position: absolute;
    bottom: 10px;
    left: 0;
    right: 0;
    text-align: center;
    color: #2a6;
    font-size: 12px;
    letter-spacing: 2px;
    pointer-events: none;
    text-transform: uppercase;
    opacity: 0.7;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div id="hint">Pfeile / WASD = Steuern &nbsp;·&nbsp; Leertaste = Schießen &nbsp;·&nbsp; P = Pause</div>
</div>
<script>
(function () {
  "use strict";

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  // Logische Spielfläche (skaliert auf das Fenster)
  const W = 900, H = 675;
  canvas.width = W;
  canvas.height = H;

  function resize() {
    const pad = 20;
    const scale = Math.min((window.innerWidth - pad) / W, (window.innerHeight - pad) / H);
    canvas.style.width = Math.floor(W * scale) + "px";
    canvas.style.height = Math.floor(H * scale) + "px";
  }
  window.addEventListener("resize", resize);
  resize();

  // ---- Hilfsfunktionen ----------------------------------------------------
  const TAU = Math.PI * 2;
  const rand = (a, b) => a + Math.random() * (b - a);
  const randInt = (a, b) => Math.floor(rand(a, b + 1));

  function wrap(obj) {
    if (obj.x < 0) obj.x += W;
    else if (obj.x > W) obj.x -= W;
    if (obj.y < 0) obj.y += H;
    else if (obj.y > H) obj.y -= H;
  }

  // ---- Eingabe ------------------------------------------------------------
  const keys = {};
  const KEYMAP = {
    ArrowLeft: "left", KeyA: "left",
    ArrowRight: "right", KeyD: "right",
    ArrowUp: "thrust", KeyW: "thrust",
    Space: "fire",
    KeyP: "pause",
    Enter: "start",
  };
  window.addEventListener("keydown", (e) => {
    if (state === "enter") { handleNameKey(e); return; }
    const k = KEYMAP[e.code];
    if (k) {
      e.preventDefault();
      if (!keys[k]) keydownEdge(k);
      keys[k] = true;
    }
  });
  window.addEventListener("keyup", (e) => {
    const k = KEYMAP[e.code];
    if (k) { e.preventDefault(); keys[k] = false; }
  });

  function keydownEdge(k) {
    if (k === "fire") wantFire = true;
    if (k === "pause" && state === "play") paused = !paused;
    if (k === "start" && (state === "title" || state === "over")) startGame();
  }

  // ---- Spielobjekte -------------------------------------------------------
  let ship, asteroids, bullets, particles;
  let score, lives, level, best = 0;
  let state = "title";       // title | play | enter | over
  let paused = false;
  let wantFire = false;
  let respawnTimer = 0;
  let invuln = 0;
  let frame = 0;

  // ---- Leaderboard (persistent via localStorage) --------------------------
  const LB_KEY = "asteroids_leaderboard_v1";
  const LB_MAX = 10;
  let board = loadBoard();
  let nameEntry = "";
  let pendingScore = 0, pendingLevel = 1;
  let lastEntryIndex = -1;
  if (board.length) best = board[0].score;

  function loadBoard() {
    try {
      const raw = localStorage.getItem(LB_KEY);
      if (raw) {
        const arr = JSON.parse(raw);
        if (Array.isArray(arr)) return arr.slice(0, LB_MAX);
      }
    } catch (e) { /* localStorage evtl. blockiert */ }
    return [];
  }
  function saveBoard() {
    try { localStorage.setItem(LB_KEY, JSON.stringify(board)); } catch (e) {}
  }
  function qualifies(sc) {
    if (sc <= 0) return false;
    if (board.length < LB_MAX) return true;
    return sc > board[board.length - 1].score;
  }
  function commitName() {
    let name = nameEntry.trim();
    if (!name) name = "ANONYM";
    board.push({ name: name, score: pendingScore, level: pendingLevel });
    board.sort((a, b) => b.score - a.score);
    board = board.slice(0, LB_MAX);
    lastEntryIndex = board.findIndex(e => e.name === name && e.score === pendingScore);
    if (board[0]) best = board[0].score;
    saveBoard();
    state = "over";
  }
  function handleNameKey(e) {
    e.preventDefault();
    if (e.key === "Enter") { commitName(); return; }
    if (e.key === "Backspace") { nameEntry = nameEntry.slice(0, -1); return; }
    if (e.key.length === 1 && nameEntry.length < 14) {
      const ch = e.key.toUpperCase();
      if (/[A-Z0-9 .\-_!]/.test(ch)) nameEntry += ch;
    }
  }
  function endGame() {
    if (score > best) best = score;
    if (qualifies(score)) {
      pendingScore = score;
      pendingLevel = level;
      nameEntry = "";
      state = "enter";
    } else {
      lastEntryIndex = -1;
      state = "over";
    }
  }

  function makeShip() {
    return {
      x: W / 2, y: H / 2,
      vx: 0, vy: 0,
      angle: -Math.PI / 2, // nach oben
      radius: 14,
      thrusting: false,
      cooldown: 0,
    };
  }

  // Asteroid mit gezackter Vektor-Silhouette
  function makeAsteroid(x, y, size) {
    const radiusBySize = { 3: 55, 2: 32, 1: 18 };
    const r = radiusBySize[size];
    const verts = randInt(9, 13);
    const shape = [];
    for (let i = 0; i < verts; i++) {
      shape.push(rand(0.72, 1.12));
    }
    const speed = rand(0.4, 1.1) * (4 - size) * 0.55;
    const dir = rand(0, TAU);
    return {
      x, y,
      vx: Math.cos(dir) * speed,
      vy: Math.sin(dir) * speed,
      angle: rand(0, TAU),
      spin: rand(-0.02, 0.02),
      size, radius: r,
      shape,
    };
  }

  function spawnLevel(n) {
    asteroids = [];
    const count = 3 + n;
    for (let i = 0; i < count; i++) {
      // nicht direkt auf dem Schiff spawnen
      let x, y;
      do {
        x = rand(0, W);
        y = rand(0, H);
      } while (Math.hypot(x - W / 2, y - H / 2) < 180);
      asteroids.push(makeAsteroid(x, y, 3));
    }
  }

  function startGame() {
    score = 0;
    lives = 3;
    level = 1;
    bullets = [];
    particles = [];
    ship = makeShip();
    invuln = 120;
    respawnTimer = 0;
    paused = false;
    spawnLevel(level);
    state = "play";
  }

  // ---- Schießen -----------------------------------------------------------
  function fire() {
    if (!ship || ship.cooldown > 0 || bullets.length > 6) return;
    const nx = Math.cos(ship.angle), ny = Math.sin(ship.angle);
    bullets.push({
      x: ship.x + nx * ship.radius,
      y: ship.y + ny * ship.radius,
      vx: nx * 9 + ship.vx,
      vy: ny * 9 + ship.vy,
      life: 55,
    });
    ship.cooldown = 9;
    // Rückstoß
    ship.vx -= nx * 0.15;
    ship.vy -= ny * 0.15;
    beep(880, 0.05, "square", 0.05);
  }

  // ---- Explosionen / Partikel ---------------------------------------------
  function burst(x, y, n, spread) {
    for (let i = 0; i < n; i++) {
      const a = rand(0, TAU);
      const s = rand(0.5, spread);
      particles.push({
        x, y,
        vx: Math.cos(a) * s,
        vy: Math.sin(a) * s,
        life: randInt(20, 45),
        maxLife: 45,
      });
    }
  }

  function splitAsteroid(a, idx) {
    burst(a.x, a.y, a.size * 6, a.size * 1.4);
    score += (4 - a.size) * 20;
    if (score > best) best = score;
    asteroids.splice(idx, 1);
    if (a.size > 1) {
      asteroids.push(makeAsteroid(a.x, a.y, a.size - 1));
      asteroids.push(makeAsteroid(a.x, a.y, a.size - 1));
    }
    beep(140 + (3 - a.size) * 90, 0.12, "sawtooth", 0.06);
  }

  // ---- Sound (WebAudio, ohne externe Dateien) -----------------------------
  let audioCtx = null;
  function beep(freq, dur, type, vol) {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type || "square";
      o.frequency.value = freq;
      g.gain.value = vol || 0.05;
      o.connect(g); g.connect(audioCtx.destination);
      const t = audioCtx.currentTime;
      g.gain.setValueAtTime(vol || 0.05, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.start(t);
      o.stop(t + dur);
    } catch (e) { /* Audio optional */ }
  }

  // ---- Update -------------------------------------------------------------
  function update() {
    if (state !== "play" || paused) return;

    // Schiff
    if (ship) {
      if (keys.left) ship.angle -= 0.07;
      if (keys.right) ship.angle += 0.07;
      ship.thrusting = keys.thrust;
      if (ship.thrusting) {
        ship.vx += Math.cos(ship.angle) * 0.14;
        ship.vy += Math.sin(ship.angle) * 0.14;
        if (Math.random() < 0.6) {
          const a = ship.angle + Math.PI + rand(-0.4, 0.4);
          particles.push({
            x: ship.x + Math.cos(ship.angle) * -ship.radius,
            y: ship.y + Math.sin(ship.angle) * -ship.radius,
            vx: Math.cos(a) * rand(1, 2.5),
            vy: Math.sin(a) * rand(1, 2.5),
            life: randInt(10, 20), maxLife: 20,
          });
        }
      }
      // Reibung + Höchstgeschwindigkeit
      ship.vx *= 0.992;
      ship.vy *= 0.992;
      const sp = Math.hypot(ship.vx, ship.vy);
      const maxSp = 8;
      if (sp > maxSp) { ship.vx = ship.vx / sp * maxSp; ship.vy = ship.vy / sp * maxSp; }
      ship.x += ship.vx;
      ship.y += ship.vy;
      wrap(ship);
      if (ship.cooldown > 0) ship.cooldown--;

      if ((keys.fire || wantFire)) { fire(); wantFire = false; }
      if (invuln > 0) invuln--;
    } else {
      // Respawn nach Tod
      respawnTimer--;
      if (respawnTimer <= 0) {
        ship = makeShip();
        invuln = 120;
      }
    }

    // Kugeln
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx; b.y += b.vy;
      wrap(b);
      if (--b.life <= 0) { bullets.splice(i, 1); continue; }
    }

    // Asteroiden bewegen
    for (const a of asteroids) {
      a.x += a.vx; a.y += a.vy;
      a.angle += a.spin;
      wrap(a);
    }

    // Kollision Kugel <-> Asteroid
    for (let i = asteroids.length - 1; i >= 0; i--) {
      const a = asteroids[i];
      for (let j = bullets.length - 1; j >= 0; j--) {
        const b = bullets[j];
        if (Math.hypot(a.x - b.x, a.y - b.y) < a.radius) {
          bullets.splice(j, 1);
          splitAsteroid(a, i);
          break;
        }
      }
    }

    // Kollision Schiff <-> Asteroid
    if (ship && invuln <= 0) {
      for (let i = asteroids.length - 1; i >= 0; i--) {
        const a = asteroids[i];
        if (Math.hypot(a.x - ship.x, a.y - ship.y) < a.radius + ship.radius * 0.7) {
          burst(ship.x, ship.y, 30, 4);
          beep(90, 0.4, "sawtooth", 0.08);
          splitAsteroid(a, i);
          ship = null;
          lives--;
          respawnTimer = 90;
          if (lives <= 0) endGame();
          break;
        }
      }
    }

    // Partikel
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.96; p.vy *= 0.96;
      if (--p.life <= 0) particles.splice(i, 1);
    }

    // Level geschafft?
    if (asteroids.length === 0 && state === "play") {
      level++;
      spawnLevel(level);
      invuln = Math.max(invuln, 60);
    }
  }

  // ---- Rendering (Vektor-Look) --------------------------------------------
  function line(pts, close, color, width) {
    ctx.strokeStyle = color || "#fff";
    ctx.lineWidth = width || 2;
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    if (close) ctx.closePath();
    ctx.stroke();
  }

  function drawShip(s, glow) {
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.angle + Math.PI / 2);
    const c = glow ? "#7ef" : "#fff";
    ctx.shadowColor = "#7ef";
    ctx.shadowBlur = 8;
    // Rumpf
    line([[0, -16], [11, 14], [0, 8], [-11, 14]], true, c, 2);
    // Schub-Flamme
    if (s.thrusting && Math.random() < 0.8) {
      line([[-5, 10], [0, 22], [5, 10]], false, "#f93", 2);
    }
    ctx.restore();
    ctx.shadowBlur = 0;
  }

  function drawAsteroid(a) {
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.rotate(a.angle);
    ctx.strokeStyle = "#cfe";
    ctx.lineWidth = 2;
    ctx.shadowColor = "#8cf";
    ctx.shadowBlur = 6;
    ctx.beginPath();
    const n = a.shape.length;
    for (let i = 0; i < n; i++) {
      const ang = (i / n) * TAU;
      const r = a.radius * a.shape[i];
      const px = Math.cos(ang) * r, py = Math.sin(ang) * r;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
    ctx.shadowBlur = 0;
  }

  function drawText(txt, x, y, size, color, align) {
    ctx.fillStyle = color || "#fff";
    ctx.font = size + "px 'Courier New', monospace";
    ctx.textAlign = align || "center";
    ctx.textBaseline = "middle";
    ctx.fillText(txt, x, y);
  }

  function drawBoard(cx, topY, rowH, fs, highlight) {
    const left = cx - 200, right = cx + 200;
    if (!board.length) {
      drawText("NOCH KEINE EINTRÄGE — SEI DER ERSTE!", cx, topY + rowH, fs, "#3a8");
      return;
    }
    for (let i = 0; i < board.length; i++) {
      const e = board[i];
      const y = topY + i * rowH;
      let col = "#9cf";
      if (i === highlight) col = (frame % 30 < 15) ? "#ff6" : "#fd3";
      else if (i === 0) col = "#7ef";
      drawText((i + 1) + ".", left + 34, y, fs, col, "right");
      drawText(e.name, left + 54, y, fs, col, "left");
      drawText(String(e.score).padStart(6, "0"), right, y, fs, col, "right");
    }
  }

  function render() {
    // Nachleucht-Effekt statt hartem Clear
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.fillRect(0, 0, W, H);

    // Partikel
    for (const p of particles) {
      const alpha = p.life / p.maxLife;
      ctx.fillStyle = "rgba(255,220,140," + alpha.toFixed(3) + ")";
      ctx.fillRect(p.x - 1.5, p.y - 1.5, 3, 3);
    }

    // Kugeln
    ctx.fillStyle = "#fff";
    ctx.shadowColor = "#fff";
    ctx.shadowBlur = 8;
    for (const b of bullets) {
      ctx.beginPath();
      ctx.arc(b.x, b.y, 2.4, 0, TAU);
      ctx.fill();
    }
    ctx.shadowBlur = 0;

    // Asteroiden
    for (const a of asteroids) drawAsteroid(a);

    // Schiff (blinkt bei Unverwundbarkeit)
    if (ship && (invuln <= 0 || Math.floor(invuln / 6) % 2 === 0)) {
      drawShip(ship, invuln > 0);
    }

    // HUD
    drawText("SCORE " + String(score).padStart(6, "0"), 20, 30, 22, "#7ef", "left");
    drawText("HIGH " + String(best).padStart(6, "0"), W / 2, 30, 18, "#3a8", "center");
    drawText("LEVEL " + level, W - 20, 30, 18, "#3a8", "right");

    // Leben (kleine Schiffchen)
    for (let i = 0; i < lives; i++) {
      ctx.save();
      ctx.translate(30 + i * 26, 62);
      ctx.rotate(-Math.PI / 2 + Math.PI / 2);
      ctx.strokeStyle = "#7ef";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, -12); ctx.lineTo(8, 10); ctx.lineTo(0, 6); ctx.lineTo(-8, 10);
      ctx.closePath();
      ctx.stroke();
      ctx.restore();
    }

    // Overlays
    if (state === "title") {
      drawText("ASTEROIDS", W / 2, 128, 66, "#fff");
      drawText("— BESTENLISTE —", W / 2, 210, 22, "#7ef");
      drawBoard(W / 2, 252, 26, 20, -1);
      if (frame % 44 < 30) drawText("ENTER  ODER  KLICK  ZUM  STARTEN", W / 2, 560, 22, "#7ef");
      drawText("PFEILE/WASD = FLIEGEN   ·   LEERTASTE = FEUER", W / 2, 600, 15, "#3a8");
    } else if (state === "enter") {
      drawText("NEUER  HIGHSCORE!", W / 2, 175, 52, "#ff6");
      drawText("SCORE  " + score, W / 2, 232, 26, "#fff");
      drawText("NAME  EINGEBEN", W / 2, 302, 22, "#7ef");
      const cursor = (frame % 30 < 15) ? "_" : " ";
      drawText(nameEntry + cursor, W / 2, 358, 44, "#fff");
      drawText("BUCHSTABEN TIPPEN  ·  ENTER = OK  ·  BACKSPACE = LÖSCHEN", W / 2, 428, 15, "#3a8");
    } else if (state === "over") {
      drawText("GAME OVER", W / 2, 96, 58, "#f66");
      drawText("SCORE  " + score, W / 2, 146, 24, "#fff");
      drawText("— BESTENLISTE —", W / 2, 200, 20, "#7ef");
      drawBoard(W / 2, 240, 25, 19, lastEntryIndex);
      if (frame % 44 < 30) drawText("ENTER  FÜR  NEUSTART", W / 2, 632, 20, "#7ef");
    } else if (paused) {
      drawText("PAUSE", W / 2, H / 2, 56, "#7ef");
    }
  }

  // ---- Touch / Klick zum Starten ------------------------------------------
  canvas.addEventListener("pointerdown", () => {
    if (state === "title" || state === "over") startGame();
    else wantFire = true;
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  });

  // ---- Sterne im Hintergrund (einmalig, statisch gezeichnet) --------------
  // (dezent, damit der Nachleucht-Effekt sie nicht überstrahlt)
  const stars = [];
  for (let i = 0; i < 70; i++) {
    stars.push({ x: rand(0, W), y: rand(0, H), b: rand(0.1, 0.5) });
  }
  function drawStars() {
    for (const s of stars) {
      ctx.fillStyle = "rgba(160,200,255," + s.b.toFixed(2) + ")";
      ctx.fillRect(s.x, s.y, 1.5, 1.5);
    }
  }

  // ---- Hauptschleife ------------------------------------------------------
  function loop() {
    frame++;
    update();
    render();
    // Sterne nur bei Titel/Over voll sichtbar, im Spiel dezent überm Trail
    if (state !== "play") drawStars();
    requestAnimationFrame(loop);
  }

  // Init
  bullets = []; particles = []; asteroids = [];
  score = 0; lives = 3; level = 1;
  loop();
})();
</script>
</body>
</html>
